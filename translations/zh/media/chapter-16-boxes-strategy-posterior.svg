<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc"><title id="title">五种儿童选择策略的边际后验</title><desc id="desc">五条水平线表示五种策略概率的百分之八十九相容区间，空心圆表示后验均值；跟随多数和跟随第一约各占四分之一。</desc><rect width="100%" height="100%" fill="#fff"/><style>.axis{font:16px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;fill:#30332e}.label{font:19px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;fill:#30332e}.title{font:700 22px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;fill:#263f86}.grid{stroke:#c8c9c8;stroke-width:1;stroke-dasharray:3 5}.interval{stroke:#242824;stroke-width:4;stroke-linecap:round}.mean{fill:#fff;stroke:#242824;stroke-width:2.2}</style><text class="title" x="450" y="30" text-anchor="middle">隐藏策略概率的后验分布</text><line class="grid" x1="245" y1="55" x2="835" y2="55"/><text class="label" x="227" y="61" text-anchor="end">1 跟随多数</text><line class="interval" x1="519.95" y1="55" x2="773.88" y2="55"/><circle class="mean" cx="650.69" cy="55" r="6"/><line class="grid" x1="245" y1="126.25" x2="835" y2="126.25"/><text class="label" x="227" y="132.25" text-anchor="end">2 跟随少数</text><line class="interval" x1="274.06" y1="126.25" x2="499.59" y2="126.25"/><circle class="mean" cx="387.37" cy="126.25" r="6"/><line class="grid" x1="245" y1="197.5" x2="835" y2="197.5"/><text class="label" x="227" y="203.5" text-anchor="end">3 特立独行</text><line class="interval" x1="295.6" y1="197.5" x2="511.33" y2="197.5"/><circle class="mean" cx="407.31" cy="197.5" r="6"/><line class="grid" x1="245" y1="268.75" x2="835" y2="268.75"/><text class="label" x="227" y="274.75" text-anchor="end">4 随机</text><line class="interval" x1="253.41" y1="268.75" x2="820.48" y2="268.75"/><circle class="mean" cx="515.14" cy="268.75" r="6"/><line class="grid" x1="245" y1="340" x2="835" y2="340"/><text class="label" x="227" y="346" text-anchor="end">5 跟随第一</text><line class="interval" x1="537.75" y1="340" x2="770.99" y2="340"/><circle class="mean" cx="656" cy="340" r="6"/><line x1="245" y1="370" x2="835" y2="370" stroke="#343732" stroke-width="2"/><line x1="300.66" y1="370" x2="300.66" y2="377" stroke="#343732"/><text class="axis" x="300.66" y="398" text-anchor="middle">0.10</text><line x1="411.98" y1="370" x2="411.98" y2="377" stroke="#343732"/><text class="axis" x="411.98" y="398" text-anchor="middle">0.15</text><line x1="523.3" y1="370" x2="523.3" y2="377" stroke="#343732"/><text class="axis" x="523.3" y="398" text-anchor="middle">0.20</text><line x1="634.62" y1="370" x2="634.62" y2="377" stroke="#343732"/><text class="axis" x="634.62" y="398" text-anchor="middle">0.25</text><line x1="745.94" y1="370" x2="745.94" y2="377" stroke="#343732"/><text class="axis" x="745.94" y="398" text-anchor="middle">0.30</text><text class="label" x="540.0" y="422" text-anchor="middle">策略概率</text></svg>