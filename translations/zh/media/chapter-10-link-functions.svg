<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img">
<title>为什么需要 link 函数</title>
<desc>线性预测随 x 增大时会越过概率一的上界；真实概率达到一后只能保持在边界上。</desc>
<rect width="100%" height="100%" fill="#fbfaf6"/>
<rect x="130" y="70" width="960" height="460" rx="8" fill="#fff" stroke="#d9d5c8"/>
<line x1="130.0" y1="530" x2="130.0" y2="538" stroke="#30332e"/>
<text x="130.0" y="562.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="17" font-weight="400" fill="#30332e">0.0</text>
<line x1="358.6" y1="530" x2="358.6" y2="538" stroke="#30332e"/>
<text x="358.6" y="562.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="17" font-weight="400" fill="#30332e">0.5</text>
<line x1="587.1" y1="530" x2="587.1" y2="538" stroke="#30332e"/>
<text x="587.1" y="562.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="17" font-weight="400" fill="#30332e">1.0</text>
<line x1="815.7" y1="530" x2="815.7" y2="538" stroke="#30332e"/>
<text x="815.7" y="562.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="17" font-weight="400" fill="#30332e">1.5</text>
<line x1="1044.3" y1="530" x2="1044.3" y2="538" stroke="#30332e"/>
<text x="1044.3" y="562.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="17" font-weight="400" fill="#30332e">2.0</text>
<line x1="122" y1="530.0" x2="130" y2="530.0" stroke="#30332e"/>
<text x="114.0" y="536.0" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="17" font-weight="400" fill="#30332e">0.0</text>
<line x1="122" y1="359.6" x2="130" y2="359.6" stroke="#30332e"/>
<text x="114.0" y="365.6" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="17" font-weight="400" fill="#30332e">0.5</text>
<line x1="122" y1="189.3" x2="130" y2="189.3" stroke="#30332e"/>
<text x="114.0" y="195.3" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="17" font-weight="400" fill="#30332e">1.0</text>
<line x1="130" y1="530" x2="1090" y2="530" stroke="#30332e"/>
<line x1="130" y1="530" x2="130" y2="70" stroke="#30332e"/>
<line x1="130" y1="189.3" x2="1090" y2="189.3" stroke="#30332e" stroke-width="2" stroke-dasharray="9 8"/>
<line x1="130" y1="530.0" x2="1090" y2="530.0" stroke="#30332e" stroke-width="2" stroke-dasharray="9 8"/>
<text x="610.0" y="610.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="21" font-weight="400" fill="#263f86">预测变量 x</text>
<text x="42.0" y="300.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="21" font-weight="400" fill="#263f86" transform="rotate(-90 42 300.0)">概率</text>
<text x="1078.0" y="176.3" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="18" font-weight="400" fill="#666862">概率上界 1</text>
<line x1="130.0" y1="414.1" x2="733.4" y2="189.3" stroke="#737cff" stroke-width="5"/>
<line x1="733.4" y1="189.3" x2="1067.1" y2="64.9" stroke="#737cff" stroke-width="5" stroke-dasharray="13 10"/>
<line x1="733.4" y1="189.3" x2="1067.1" y2="189.3" stroke="#263f86" stroke-width="6"/>
<circle cx="733.4" cy="189.3" r="8" fill="#263f86" stroke="#fff" stroke-width="3"/>
<text x="290.0" y="336.5" text-anchor="start" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="18" font-weight="700" fill="#263f86">线性模型</text>
<text x="884.3" y="117.0" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="17" font-weight="400" fill="#666862">越过边界的外推</text>
<text x="916.3" y="223.3" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,Noto Sans CJK SC,sans-serif" font-size="17" font-weight="700" fill="#263f86">受约束的真实趋势</text>
</svg>
